<section id="projects" class="projects section">
  <div class="projects-bg">
    <div class="gradient-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
  </div>
  <div class="container">
    <h2 class="section-title">{{ 'projects.title' | translate }}</h2>
    <div class="projects-grid">
      @for (project of projects; track project.title) {
        <div class="project-card">
          <div class="project-image placeholder">
            <div class="placeholder-content">
              <span class="code-icon">{{ '{ }' }}</span>
            </div>
          </div>
          <div class="project-content">
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-description">{{ project.description }}</p>
            <div class="project-technologies">
              @for (tech of project.technologies; track tech) {
                <span class="tech-chip">{{ tech }}</span>
              }
            </div>
            @if (project.github) {
              <div class="project-links">
                <a [href]="project.github" target="_blank" rel="noopener" class="link">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.221 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.285 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                  </svg>
                  {{ 'projects.viewCode' | translate }}
                </a>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
