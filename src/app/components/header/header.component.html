<header class="header" [class.light-theme]="currentTheme === 'light'">
  <nav class="nav container">
    <a href="#home" class="nav-logo">
      <span class="logo-text">Kenyson</span>
    </a>
    <ul class="nav-menu" [class.active]="mobileMenuOpen()">
      <li class="nav-item">
        <a href="#home" class="nav-link" [class.active]="isSectionActive('home')" (click)="scrollToSection('home')">Início</a>
      </li>
      <li class="nav-item">
        <a href="#about" class="nav-link" [class.active]="isSectionActive('about')" (click)="scrollToSection('about')">Sobre</a>
      </li>
      <!-- <li class="nav-item">
         <a href="#skills" class="nav-link" [class.active]="isSectionActive('skills')" (click)="scrollToSection('skills')">Habilidades</a>
       </li> -->
       <li class="nav-item">
         <a href="#skills2" class="nav-link" [class.active]="isSectionActive('skills2')" (click)="scrollToSection('skills2')">Habilidades</a>
       </li>
      <li class="nav-item">
        <a href="#experience" class="nav-link" [class.active]="isSectionActive('experience')" (click)="scrollToSection('experience')">Experiência</a>
      </li>
      <li class="nav-item">
        <a href="#projects" class="nav-link" [class.active]="isSectionActive('projects')" (click)="scrollToSection('projects')">Projetos</a>
      </li>
      <li class="nav-item">
        <a href="#contact" class="nav-link" [class.active]="isSectionActive('contact')" (click)="scrollToSection('contact')">Contato</a>
      </li>
    </ul>
    <div class="nav-actions">
      <div class="theme-toggle">
        <button
          class="theme-btn"
          (click)="toggleTheme()"
          aria-label="Mudar tema">
          <i [class]="themeService.getThemeIcon()"></i>
        </button>
      </div>
      <button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
</header>
