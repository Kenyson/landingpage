<section id="contact" class="contact section">
  <div appSlideAnimation="right">
    <div class="container">
      <h2 class="section-title">{{ 'contact.title' | translate }}</h2>
      <div class="contact-content">
        <div class="contact-info">
          <h3>{{ 'contact.subtitle' | translate }}</h3>
          <div class="contact-methods">
            <a [href]="'mailto:' + email" class="contact-method">
              <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </div>
              <div class="details">
                <span class="label">{{ 'contact.info.email' | translate }}</span>
                <span class="value">{{ email }}</span>
              </div>
            </a>
            <a [href]="'tel:' + phone" class="contact-method">
              <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
                </svg>
              </div>
              <div class="details">
                <span class="label">{{ 'contact.info.phone' | translate }}</span>
                <span class="value">{{ phone }}</span>
              </div>
            </a>
            <a [href]="githubUrl" target="_blank" rel="noopener" class="contact-method">
              <div class="icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .322.218.694.825.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                </svg>
              </div>
              <div class="details">
                <span class="label">GitHub</span>
                <span class="value">@Kenyson</span>
              </div>
            </a>
          </div>
        </div>
        <div class="contact-form-wrapper">
          <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
<div class="form-group">
               <label for="name">{{ 'contact.form.name' | translate }}</label>
               <input pInputText type="text" id="name" name="name" [(ngModel)]="formData.name" required [placeholder]="translationService.translate('contact.form.placeholders.name')" />
             </div>
             <div class="form-group">
               <label for="emailForm">{{ 'contact.form.email' | translate }}</label>
               <input pInputText type="email" id="emailForm" name="email" [(ngModel)]="formData.email" required [placeholder]="translationService.translate('contact.form.placeholders.email')" />
             </div>
             <div class="form-group">
               <label for="message">{{ 'contact.form.message' | translate }}</label>
               <textarea pInputTextarea id="message" name="message" rows="5" [(ngModel)]="formData.message" required [placeholder]="translationService.translate('contact.form.placeholders.message')"></textarea>
             </div>
            <p-button
              type="submit"
              [label]="submitLabel"
              [disabled]="!contactForm.valid || isSubmitting"
              [loading]="isSubmitting"
              severity="primary"
              styleClass="contact-submit-btn">
            </p-button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
