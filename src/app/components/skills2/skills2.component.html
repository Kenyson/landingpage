<section id="skills2" class="skills2 section slide-from-left" appSlideAnimation="left">
  <div class="skills2-bg">
    <div class="gradient-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
  </div>
  <div class="container">
    <h2 class="section-title">{{ 'skills.title' | translate }}</h2>

    <div class="skills2-grid">
      @for (category of skillCategories; track category.key) {
        <div class="category-section">
          <h3 class="category-title">{{ getCategoryLabel(category.key) }}</h3>
          <div class="skills-list">
            @for (skill of getSkillsByCategory(category.key); track skill.name) {
              <div class="skill-item">
                <div class="skill-icon">
                  <i class="{{ skill.icon }}" style="font-size: 2rem; color: #60a5fa;"></i>
                </div>
                <div class="skill-info">
                  <h4 class="skill-name">{{ skill.name | translate }}</h4>
                  <p class="skill-description">{{ skill.description | translate }}</p>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
