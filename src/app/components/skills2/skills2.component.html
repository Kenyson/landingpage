<section id="skills2" class="skills2 section">
  <div appSlideAnimation="left">
    <div class="container">
      <h2 class="section-title">{{ 'skills.title' | translate }}</h2>

      <div class="skills2-grid">
        @for (category of skillCategories; track category.key) {
          <div class="category-section">
            <h3 class="category-title">{{ getCategoryLabel(category.key) }}</h3>
            <div class="skills-list">
              @for (skill of getSkillsByCategory(category.key); track skill.name) {
                <div class="skill-item">
                  <div class="skill-icon">
                    <ng-container *ngIf="skill.icon === 'pi pi-angular'; else defaultIcon">
                      <svg viewBox="0 0 48 48" aria-hidden="true" role="img">
                        <path fill="currentColor" d="M24 0 3 10 6 28 24 48 42 28 45 10Z" />
                        <path fill="currentColor" d="M24 0 42 10 38 24 24 40 10 24 6 10Z" />
                        <path fill="currentColor" d="M17 18 24 34 31 18 24 22Z" />
                      </svg>
                    </ng-container>
                    <ng-template #defaultIcon>
                      <i class="{{ skill.icon }}"></i>
                    </ng-template>
                  </div>
                  <div class="skill-info">
                    <h4 class="skill-name">{{ skill.name | translate }}</h4>
                    <p class="skill-description">{{ skill.description | translate }}</p>
                  </div>
                </div>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
